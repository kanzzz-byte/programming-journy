<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Decoration</title>
    <style>
        h1 {
            text-decoration: underline;
        }
        p{
            line-height: 1.5;
        }
        .upperline{
            text-decoration: overline;
        }
        .underline{
            text-decoration: underline;
        }
        .strike{
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <h1>Contoh Text Decoration</h1> 
  <p>
    <span class="underline">PUNGGAHAN 2026</span> .akan dilaksanakan pada bulan Februai.
    <span class="strike">ditunda karena cuaca buruk.</span>.
    <span class="upperline">PUNGGAHAN 2026</span> merupakan kegiatan tahunan sekolah.
  </p> 
</body>
</html>
