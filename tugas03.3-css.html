<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Tugas Text Transform</title>
    <style>
        h1 {
            text-transform: capitalize;
        }
        .upper {
            text-transform: uppercase;
        }
        .lower {
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <h1>latihan teks transform</h1>
    <p>
        <span class="upper">hay friends</span> Let me introduce myself.
        <span class="lower">MY NAME IS FERLITA AURAKANZA,  I AM WORKING ON AN ASSIGNMENT ON THE TOPIC OF TEKS TRANSFROM.
         </span>
    </p>
</body>
</html>
